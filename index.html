<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>受注入力システム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#f2f0eb;--surface:#fffefb;--primary:#1b3d2f;--primary2:#2a6049;--accent:#d94f1a;--text:#1a1a1a;--muted:#666;--border:#d8d3cb;--shadow:0 2px 10px rgba(0,0,0,0.07);--danger:#c0392b;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  .header{background:var(--primary);color:white;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
  .h-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .h-title{font-size:15px;font-weight:700;}
  .h-sub{font-size:11px;opacity:0.65;}
  .h-date{margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;opacity:0.7;text-align:right;}

  .container{max-width:540px;margin:0 auto;padding:16px 14px 130px;}
  .card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
  .card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;}

  select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:15px;background:white;color:var(--text);appearance:none;outline:none;transition:border-color 0.2s;}
  select:focus{border-color:var(--primary);}
  .sel-wrap{position:relative;}
  .sel-wrap::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:12px;}

  .prod-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .prod-count{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;background:#eee;padding:3px 8px;border-radius:10px;}
  .prod-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1.5px solid var(--border);border-radius:9px;margin-bottom:7px;background:white;transition:all 0.15s;cursor:pointer;user-select:none;}
  .prod-item.selected{border-color:var(--primary);background:#eef5f1;}
  .chk{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;transition:all 0.15s;color:white;}
  .prod-item.selected .chk{background:var(--primary);border-color:var(--primary);}
  .prod-info{flex:1;min-width:0;}
  .prod-name{font-size:13px;font-weight:500;line-height:1.4;}
  .prod-code{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
  .qty{width:64px;padding:7px 6px;font-size:15px;text-align:center;border-radius:7px;border:1.5px solid var(--border);font-family:'DM Mono',monospace;background:white;flex-shrink:0;}
  .unit-sel{padding:7px 4px;font-size:13px;border-radius:7px;border:1.5px solid var(--border);font-family:'Noto Sans JP',sans-serif;background:white;flex-shrink:0;outline:none;cursor:pointer;max-width:72px;}
  .prod-item.selected .unit-sel{border-color:var(--primary2);}
  .prod-item.selected .qty{border-color:var(--primary2);}
  .placeholder{text-align:center;padding:36px 16px;color:var(--muted);}
  .placeholder .ico{font-size:38px;margin-bottom:10px;}
  .placeholder p{font-size:13px;line-height:1.7;}
  textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:14px;resize:none;height:72px;background:white;outline:none;}
  textarea:focus{border-color:var(--primary);}

  /* 受注ログ */
  .log-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow);}
  .log-card-header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
  .log-card-title{font-size:13px;font-weight:700;}
  .log-badge{background:var(--accent);color:white;font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;font-family:'DM Mono',monospace;}
  .log-empty{padding:18px;text-align:center;font-size:13px;color:var(--muted);}
  .log-row{display:flex;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);align-items:flex-start;font-size:13px;}
  .log-row.cancelled{opacity:0.4;}
  .log-row:last-child{border-bottom:none;}
  .log-num{font-family:'DM Mono',monospace;font-size:11px;color:white;background:var(--primary2);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;margin-top:1px;}
  .log-num.cancelled-num{background:#aaa;}
  .log-body{flex:1;min-width:0;}
  .log-cname{font-weight:700;font-size:14px;}
  .log-time{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-left:6px;}
  .log-items{font-size:12px;color:#555;margin-top:3px;line-height:1.6;}
  .log-cancel-btn{flex-shrink:0;padding:5px 10px;border:1.5px solid #e0b0aa;background:white;color:var(--danger);border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
  .log-cancel-btn:disabled{border-color:#ddd;color:#bbb;cursor:not-allowed;}
  .cancelled-label{flex-shrink:0;font-size:11px;color:#aaa;font-weight:700;}
  .print-all-btn{width:100%;padding:13px;background:var(--primary);color:white;border:none;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
  .print-all-btn:disabled{background:#ccc;color:#999;cursor:not-allowed;}

  .submit-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);padding:12px 14px;z-index:100;}
  .submit-btn{width:100%;max-width:540px;display:block;margin:0 auto;padding:15px;background:var(--border);color:var(--muted);border:none;border-radius:11px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:not-allowed;transition:all 0.2s;}
  .submit-btn.active{background:var(--accent);color:white;cursor:pointer;}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:flex-end;justify-content:center;}
  .overlay.show{display:flex;}
  .sheet{background:var(--surface);border-radius:18px 18px 0 0;padding:22px 18px 36px;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;}
  .sheet h2{font-size:17px;font-weight:700;margin-bottom:4px;}
  .sheet .meta{font-size:13px;color:var(--muted);margin-bottom:18px;}
  .cf-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;gap:10px;}
  .cf-item:last-of-type{border-bottom:none;}
  .cf-name{flex:1;line-height:1.4;}
  .cf-qty{font-family:'DM Mono',monospace;font-weight:700;color:var(--primary);white-space:nowrap;}
  .cf-btns{display:flex;gap:8px;margin-top:18px;}
  .btn-back{flex:1;padding:13px;border:2px solid var(--border);background:white;border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer;}
  .btn-send{flex:2;padding:13px;background:var(--accent);color:white;border:none;border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}

  .success{display:none;position:fixed;inset:0;background:var(--primary);z-index:300;flex-direction:column;align-items:center;justify-content:center;color:white;text-align:center;padding:36px;}
  .success.show{display:flex;}
  .s-icon{width:76px;height:76px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:22px;animation:pop .35s ease;}
  @keyframes pop{0%{transform:scale(0)}75%{transform:scale(1.12)}100%{transform:scale(1)}}
  .success h2{font-size:22px;margin-bottom:8px;}
  .success p{font-size:13px;opacity:0.75;margin-bottom:28px;line-height:1.8;white-space:pre-line;}
  .s-btns{display:flex;gap:10px;}
  .btn-print-now{padding:14px 28px;background:rgba(255,255,255,0.2);color:white;border:2px solid rgba(255,255,255,0.5);border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
  .btn-next{padding:14px 28px;background:white;color:var(--primary);border:none;border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}

  /* 印刷スタイル */
  @media print {
    @page { size: A4; margin: 15mm 12mm; }
    body > *:not(#print-area){ display:none!important; }
    #print-area{ display:block!important; font-family:'Noto Sans JP','メイリオ',sans-serif; }

    .print-page-header{ border-bottom:3px solid #1b3d2f; padding-bottom:10px; margin-bottom:18px; }
    .print-page-header h1{ font-size:22pt; font-weight:700; color:#1b3d2f; }
    .print-page-header .ph-meta{ font-size:10pt; color:#555; margin-top:4px; }

    .order-block{ page-break-inside:avoid; margin-bottom:20px; border:1.5px solid #bbb; border-radius:4px; overflow:hidden; }
    .order-block.cancelled-block{ opacity:0.4; }

    .ob-header{ background:#1b3d2f; color:white; padding:8px 12px; display:flex; justify-content:space-between; align-items:center; }
    .ob-seq{ font-size:9pt; opacity:0.8; }
    .ob-cname{ font-size:15pt; font-weight:700; }
    .ob-code{ font-size:9pt; opacity:0.8; margin-top:1px; }
    .ob-meta{ font-size:9pt; opacity:0.8; text-align:right; }
    .cancelled-stamp{ background:#c0392b; color:white; font-size:9pt; font-weight:700; padding:2px 8px; border-radius:3px; }

    .ob-table{ width:100%; border-collapse:collapse; }
    .ob-table th{ background:#eef5f1; font-size:10pt; font-weight:700; padding:7px 10px; border:1px solid #ccc; text-align:center; }
    .ob-table td{ font-size:12pt; padding:9px 10px; border:1px solid #ccc; vertical-align:middle; line-height:1.4; }
    .ob-table .col-check{ width:36px; text-align:center; font-size:14pt; }
    .ob-table .col-code{ width:70px; text-align:center; font-size:10pt; color:#555; }
    .ob-table .col-name{ text-align:left; }
    .ob-table .col-qty{ width:55px; text-align:center; font-weight:700; font-size:13pt; }
    .ob-table tr:nth-child(even) td{ background:#fafafa; }

    .ob-memo{ padding:7px 12px; background:#fffbf0; border-top:1px dashed #ccc; font-size:10pt; color:#555; }
    .print-footer{ margin-top:14px; font-size:8pt; color:#aaa; text-align:right; }
  }
  .free-item-row{display:flex;gap:6px;align-items:center;margin-bottom:7px;padding:10px 12px;border:1.5px dashed var(--border);border-radius:9px;background:#fffefb;}
  .free-item-name{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;}
  .free-item-name:focus{border-color:var(--primary);}
  .free-item-qty{width:60px;padding:8px 6px;text-align:center;border:1.5px solid var(--border);border-radius:7px;font-size:14px;font-family:'DM Mono',monospace;outline:none;}
  .free-item-unit{padding:8px 4px;font-size:13px;border-radius:7px;border:1.5px solid var(--border);font-family:'Noto Sans JP',sans-serif;background:white;outline:none;max-width:70px;}
  .free-item-del{width:28px;height:28px;background:none;border:none;font-size:18px;color:#aaa;cursor:pointer;flex-shrink:0;padding:0;}
  .cust-search-wrap{position:relative;}
  .cust-search-input{width:100%;padding:12px 14px 12px 36px;border:1.5px solid var(--border);border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:15px;outline:none;background:white;box-sizing:border-box;cursor:pointer;}
  .cust-search-input:focus{border-color:var(--primary);}
  .cust-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
  .cust-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1.5px solid var(--primary);border-radius:9px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:100;max-height:260px;overflow-y:auto;display:none;}
  .cust-dropdown.open{display:block;}
  .cust-opt{padding:11px 14px;font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer;border-bottom:1px solid #f0f0ee;}
  .cust-opt:last-child{border-bottom:none;}
  .cust-opt:hover,.cust-opt.active{background:var(--primary-light);}
  .cust-opt.new-opt{color:var(--primary2);font-weight:700;}
  .cust-opt mark{background:#fff3b0;color:inherit;font-weight:700;border-radius:2px;}
  #print-area{ display:none; }
</style>
</head>
<body>
<div class="header">
  <div class="h-icon">📦</div>
  <div><div class="h-title">受注入力システム</div><div class="h-sub">営業担当者用</div></div>
  <div class="h-date" id="hdate"></div>
</div>

<div class="container">
  <div class="card">
    <div class="card-label">担当者</div>
    <div class="sel-wrap">
      <select id="sel-staff" onchange="checkReady()">
        <option value="">選択してください</option>
        <option>貞清</option><option>河村</option><option>佐藤</option><option>石井</option>
        <option>江田</option><option>小野</option><option>野村</option><option>末広</option>
        <option>川原</option><option>○○</option>
      </select>
    </div>
  </div>
  <div class="card">
    <div class="card-label">顧客</div>
    <div class="cust-search-wrap" id="cust-search-wrap">
      <span class="cust-search-icon">🔍</span>
      <input type="text" id="cust-search-input" class="cust-search-input" placeholder="顧客名で検索または選択…"
        oninput="filterCustomers()" onfocus="openCustDropdown()" autocomplete="off" readonly>
      <input type="hidden" id="sel-customer" value="">
      <div class="cust-dropdown" id="cust-dropdown"></div>
    </div>
    <div id="new-cust-wrap" style="display:none;margin-top:8px;">
      <input type="text" id="new-cust-name" placeholder="顧客名を入力してください"
        style="width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:15px;outline:none;background:white;"
        onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'"
        oninput="checkReady()">
    </div>
  </div>
  <div class="card">
    <div class="prod-header">
      <div class="card-label" style="margin-bottom:0">注文商品</div>
      <div class="prod-count" id="prod-count">0件選択</div>
    </div>
    <div id="prod-search-wrap" style="display:none;margin-bottom:10px;position:relative;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;">🔍</span>
      <input type="text" id="prod-search" placeholder="商品名で絞り込み…" oninput="filterProducts()"
        style="width:100%;padding:10px 14px 10px 36px;border:1.5px solid var(--border);border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;background:white;"
        onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'">
    </div>
    <div id="prod-list">
      <div class="placeholder"><div class="ico">🏪</div><p>顧客を選ぶと<br>定番商品が表示されます</p></div>
    </div>
    <div id="free-items-wrap" style="display:none;">
      <div id="free-items-list"></div>
      <button onclick="addFreeItem()" style="width:100%;margin-top:6px;padding:10px;background:white;border:1.5px dashed var(--border);border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--primary2);cursor:pointer;font-weight:700;">＋ 商品を手入力</button>
    </div>
  </div>
  <div class="card">
    <div class="card-label">メモ（任意）</div>
    <textarea id="memo" placeholder="特記事項があれば入力…"></textarea>
  </div>
  <div class="log-card" id="log-card" style="display:none;">
    <div class="log-card-header">
      <div class="log-card-title">📋 本日の受注ログ</div>
      <div class="log-badge" id="log-badge">0件</div>
    </div>
    <div id="log-body"><div class="log-empty">まだ受注がありません</div></div>
    <button class="print-all-btn" id="print-all-btn" onclick="printAll()" disabled>🖨️ まとめて印刷（取消を除く全件）</button>
  </div>
</div>

<div class="submit-bar">
  <button class="submit-btn" id="submit-btn" onclick="showConfirm()">担当者と顧客を選択してください</button>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h2>📋 注文内容の確認</h2>
    <div class="meta" id="cf-meta"></div>
    <div id="cf-items"></div>
    <div id="cf-memo"></div>
    <div class="cf-btns">
      <button class="btn-back" onclick="closeOverlay()">修正する</button>
      <button class="btn-send" id="btn-send" onclick="submitOrder()">送信する ✓</button>
    </div>
  </div>
</div>

<div class="success" id="success">
  <div class="s-icon">✓</div>
  <h2>送信完了！</h2>
  <p id="s-msg"></p>
  <div class="s-btns">
    <button class="btn-print-now" onclick="printLatest()">🖨️ この1件を印刷</button>
    <button class="btn-next" onclick="resetForm()">次の顧客へ</button>
  </div>
</div>

function toHalfKanaC(str){
  const m={'ア':'ｱ','イ':'ｲ','ウ':'ｳ','エ':'ｴ','オ':'ｵ','カ':'ｶ','キ':'ｷ','ク':'ｸ','ケ':'ｹ','コ':'ｺ','サ':'ｻ','シ':'ｼ','ス':'ｽ','セ':'ｾ','ソ':'ｿ','タ':'ﾀ','チ':'ﾁ','ツ':'ﾂ','テ':'ﾃ','ト':'ﾄ','ナ':'ﾅ','ニ':'ﾆ','ヌ':'ﾇ','ネ':'ﾈ','ノ':'ﾉ','ハ':'ﾊ','ヒ':'ﾋ','フ':'ﾌ','ヘ':'ﾍ','ホ':'ﾎ','マ':'ﾏ','ミ':'ﾐ','ム':'ﾑ','メ':'ﾒ','モ':'ﾓ','ヤ':'ﾔ','ユ':'ﾕ','ヨ':'ﾖ','ラ':'ﾗ','リ':'ﾘ','ル':'ﾙ','レ':'ﾚ','ロ':'ﾛ','ワ':'ﾜ','ヲ':'ｦ','ン':'ﾝ','ァ':'ｧ','ィ':'ｨ','ゥ':'ｩ','ェ':'ｪ','ォ':'ｫ','ッ':'ｯ','ャ':'ｬ','ュ':'ｭ','ョ':'ｮ','ガ':'ｶﾞ','ギ':'ｷﾞ','グ':'ｸﾞ','ゲ':'ｹﾞ','ゴ':'ｺﾞ','ザ':'ｻﾞ','ジ':'ｼﾞ','ズ':'ｽﾞ','ゼ':'ｾﾞ','ゾ':'ｿﾞ','ダ':'ﾀﾞ','ヂ':'ﾁﾞ','ヅ':'ﾂﾞ','デ':'ﾃﾞ','ド':'ﾄﾞ','バ':'ﾊﾞ','ビ':'ﾋﾞ','ブ':'ﾌﾞ','ベ':'ﾍﾞ','ボ':'ﾎﾞ','パ':'ﾊﾟ','ピ':'ﾋﾟ','プ':'ﾌﾟ','ペ':'ﾍﾟ','ポ':'ﾎﾟ','ヴ':'ｳﾞ','ー':'ｰ'};
  return str.split('').map(c=>m[c]||c).join('');
}

function hlMatch(text, q){
  if(!q) return text;
  const lo=text.toLowerCase(), qi=q.toLowerCase();
  const idx=lo.indexOf(qi);
  if(idx<0){
    // 半角変換でも試みる
    const th=toHalfKanaC(text).toLowerCase(), qh=toHalfKanaC(q).toLowerCase();
    const idxH=th.indexOf(qh);
    if(idxH<0) return text;
    return text.slice(0,idxH)+'<mark>'+text.slice(idxH,idxH+q.length)+'</mark>'+text.slice(idxH+q.length);
  }
  return text.slice(0,idx)+'<mark>'+text.slice(idx,idx+q.length)+'</mark>'+text.slice(idx+q.length);
}

// ソート済み顧客リスト
const CUST_LIST = Object.keys(CUSTOMER_DATA)
  .sort((a,b)=>CUSTOMER_DATA[a].name.localeCompare(CUSTOMER_DATA[b].name,'ja'))
  .map(k=>({cid:k, name:CUSTOMER_DATA[k].name}));

function buildCustDropdown(q=''){
  const dd=document.getElementById('cust-dropdown');
  const hq=toHalfKanaC(q).toLowerCase();
  let inner='<div class="cust-opt new-opt" data-cid="__new__" data-name="📝 新規・台帳外顧客">📝 新規・台帳外顧客</div>';
  CUST_LIST.forEach(({cid,name})=>{
    const lo=name.toLowerCase(), hn=toHalfKanaC(name).toLowerCase();
    if(!q||lo.includes(q.toLowerCase())||hn.includes(hq)){
      const esc=name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      inner+=`<div class="cust-opt" data-cid="${cid}" data-name="${esc}">${q?hlMatch(name,q):name}</div>`;
    }
  });
  dd.innerHTML=inner;
  // クリックイベントをdelegationで処理
  dd.onclick=(e)=>{
    const el=e.target.closest('.cust-opt');
    if(!el) return;
    selectCustomer(el.dataset.cid, el.dataset.name);
  };
}

function openCustDropdown(){
  const inp=document.getElementById('cust-search-input');
  inp.removeAttribute('readonly');
  buildCustDropdown('');
  document.getElementById('cust-dropdown').classList.add('open');
  setTimeout(()=>{ document.addEventListener('click', custOutsideHandler, {once:true}); },0);
}

function custOutsideHandler(e){
  if(document.getElementById('cust-search-wrap').contains(e.target)){
    document.addEventListener('click', custOutsideHandler, {once:true});
  } else {
    document.getElementById('cust-dropdown').classList.remove('open');
    const inp=document.getElementById('cust-search-input');
    if(!custSel.value){ inp.value=''; }
    inp.setAttribute('readonly','');
  }
}

function filterCustomers(){
  const q=document.getElementById('cust-search-input').value.trim();
  buildCustDropdown(q);
  document.getElementById('cust-dropdown').classList.add('open');
}

function selectCustomer(cid, name){
  custSel.value=cid;
  const inp=document.getElementById('cust-search-input');
  inp.value = cid==='__new__' ? '📝 新規・台帳外顧客' : name;
  inp.setAttribute('readonly','');
  document.getElementById('cust-dropdown').classList.remove('open');
  loadProducts();
}

const now=new Date();
document.getElementById('hdate').innerHTML=
  now.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'})+'<br>'+
  now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});

let selected={};
let orderLog=[]; // {no,staff,cid,cname,items,memo,time,cancelled}
let lastNo=0;

const UNITS=['本','枚','袋','箱','ケース'];
function unitOpts(){return UNITS.map(u=>`<option value="${u}">${u}</option>`).join('');}

function loadProducts(){
  selected={};
  const cid=custSel.value;
  const list=document.getElementById('prod-list');
  const sw=document.getElementById('prod-search-wrap');
  const si=document.getElementById('prod-search');
  const ncw=document.getElementById('new-cust-wrap');
  const fiw=document.getElementById('free-items-wrap');
  const fil=document.getElementById('free-items-list');

  // 新規顧客の場合
  if(cid==='__new__'){
    ncw.style.display='block';
    list.innerHTML='<div class="placeholder" style="padding:16px 0"><p style="font-size:13px;color:var(--muted)">商品は下の「商品を手入力」から追加してください</p></div>';
    sw.style.display='none'; si.value='';
    fiw.style.display='block'; fil.innerHTML='';
    checkReady(); return;
  }
  ncw.style.display='none';
  document.getElementById('new-cust-name').value='';

  if(!cid){
    list.innerHTML='<div class="placeholder"><div class="ico">🏪</div><p>顧客を選ぶと<br>定番商品が表示されます</p></div>';
    sw.style.display='none'; si.value='';
    fiw.style.display='none'; fil.innerHTML='';
    checkReady(); return;
  }
  list.innerHTML=''; si.value=''; fil.innerHTML='';
  CUSTOMER_DATA[cid].products.forEach(p=>{
    const d=document.createElement('div'); d.className='prod-item'; d.id='pi-'+p.code;
    d.innerHTML=`<div class="chk" id="chk-${p.code}"></div><div class="prod-info"><div class="prod-name">${p.name}</div><div class="prod-code">#${p.code}</div></div><input class="qty" type="number" id="qty-${p.code}" min="1" value="1" onclick="event.stopPropagation()" oninput="syncQty(${p.code})"><select class="unit-sel" id="unit-${p.code}" onclick="event.stopPropagation()">${unitOpts()}</select>`;
    d.onclick=()=>toggleProd(p.code); list.appendChild(d);
  });
  sw.style.display=CUSTOMER_DATA[cid].products.length>=5?'block':'none';
  fiw.style.display='block';
  checkReady();
}

let freeItemCount=0;
function addFreeItem(){
  freeItemCount++;
  const id='fi-'+freeItemCount;
  const row=document.createElement('div'); row.className='free-item-row'; row.id=id;
  row.innerHTML=`<input class="free-item-name" type="text" placeholder="商品名" oninput="checkReady()"><input class="free-item-qty" type="number" min="1" value="1"><select class="free-item-unit">${unitOpts()}</select><button class="free-item-del" onclick="document.getElementById('${id}').remove();checkReady()">×</button>`;
  document.getElementById('free-items-list').appendChild(row);
  checkReady();
}

function getFreeItems(){
  return Array.from(document.querySelectorAll('.free-item-row')).map(row=>{
    const name=row.querySelector('.free-item-name').value.trim();
    const qty=parseInt(row.querySelector('.free-item-qty').value)||1;
    const unit=row.querySelector('.free-item-unit').value;
    return name?{code:'新規',name,qty,unit}:null;
  }).filter(Boolean);
}

function toHalfKana(str){
  const m={'ア':'ｱ','イ':'ｲ','ウ':'ｳ','エ':'ｴ','オ':'ｵ','カ':'ｶ','キ':'ｷ','ク':'ｸ','ケ':'ｹ','コ':'ｺ','サ':'ｻ','シ':'ｼ','ス':'ｽ','セ':'ｾ','ソ':'ｿ','タ':'ﾀ','チ':'ﾁ','ツ':'ﾂ','テ':'ﾃ','ト':'ﾄ','ナ':'ﾅ','ニ':'ﾆ','ヌ':'ﾇ','ネ':'ﾈ','ノ':'ﾉ','ハ':'ﾊ','ヒ':'ﾋ','フ':'ﾌ','ヘ':'ﾍ','ホ':'ﾎ','マ':'ﾏ','ミ':'ﾐ','ム':'ﾑ','メ':'ﾒ','モ':'ﾓ','ヤ':'ﾔ','ユ':'ﾕ','ヨ':'ﾖ','ラ':'ﾗ','リ':'ﾘ','ル':'ﾙ','レ':'ﾚ','ロ':'ﾛ','ワ':'ﾜ','ヲ':'ｦ','ン':'ﾝ','ァ':'ｧ','ィ':'ｨ','ゥ':'ｩ','ェ':'ｪ','ォ':'ｫ','ッ':'ｯ','ャ':'ｬ','ュ':'ｭ','ョ':'ｮ','ガ':'ｶﾞ','ギ':'ｷﾞ','グ':'ｸﾞ','ゲ':'ｹﾞ','ゴ':'ｺﾞ','ザ':'ｻﾞ','ジ':'ｼﾞ','ズ':'ｽﾞ','ゼ':'ｾﾞ','ゾ':'ｿﾞ','ダ':'ﾀﾞ','ヂ':'ﾁﾞ','ヅ':'ﾂﾞ','デ':'ﾃﾞ','ド':'ﾄﾞ','バ':'ﾊﾞ','ビ':'ﾋﾞ','ブ':'ﾌﾞ','ベ':'ﾍﾞ','ボ':'ﾎﾞ','パ':'ﾊﾟ','ピ':'ﾋﾟ','プ':'ﾌﾟ','ペ':'ﾍﾟ','ポ':'ﾎﾟ','ヴ':'ｳﾞ','ー':'ｰ'};
  return str.split('').map(c=>m[c]||c).join('');
}

function filterProducts(){
  const raw=document.getElementById('prod-search').value.trim();
  const q=toHalfKana(raw).toLowerCase();
  const cid=custSel.value; if(!cid)return;
  CUSTOMER_DATA[cid].products.forEach(p=>{
    const el=document.getElementById('pi-'+p.code); if(!el)return;
    const t=p.name.toLowerCase();
    el.style.display=(t.includes(q)||t.includes(raw.toLowerCase()))?'flex':'none';
  });
}

function toggleProd(code){
  const item=document.getElementById('pi-'+code), chk=document.getElementById('chk-'+code);
  if(selected[code]!==undefined){delete selected[code];item.classList.remove('selected');chk.textContent='';}
  else{selected[code]=parseInt(document.getElementById('qty-'+code).value)||1;item.classList.add('selected');chk.textContent='✓';}
  checkReady();
}
function syncQty(code){if(selected[code]!==undefined)selected[code]=parseInt(document.getElementById('qty-'+code).value)||1;}

function checkReady(){
  const n=Object.keys(selected).length;
  const freeItems=getFreeItems?getFreeItems():[];
  const total=n+freeItems.length;
  document.getElementById('prod-count').textContent=total+'件選択';
  const btn=document.getElementById('submit-btn');
  const staff=document.getElementById('sel-staff').value, cust=custSel.value;
  const newName=document.getElementById('new-cust-name')?document.getElementById('new-cust-name').value.trim():'';
  const custOk=cust&&(cust!=='__new__'||newName);
  if(staff&&custOk&&total>0){btn.className='submit-btn active';btn.textContent='確認・送信 ('+total+'件)';btn.disabled=false;}
  else{
    btn.className='submit-btn';
    if(!staff||!cust) btn.textContent='担当者と顧客を選択してください';
    else if(cust==='__new__'&&!newName) btn.textContent='顧客名を入力してください';
    else btn.textContent='商品を1つ以上選択してください';
    btn.disabled=true;
  }
}

function showConfirm(){
  const staff=document.getElementById('sel-staff').value, cid=custSel.value;
  const cname=cid==='__new__'?document.getElementById('new-cust-name').value.trim():(CUSTOMER_DATA[cid]?CUSTOMER_DATA[cid].name:cid);
  const memo=document.getElementById('memo').value;
  document.getElementById('cf-meta').textContent=staff+' › '+cname+(cid==='__new__'?' 【新規】':'');
  let html='';
  if(cid!=='__new__'){
    Object.keys(selected).forEach(code=>{
      const p=CUSTOMER_DATA[cid].products.find(x=>x.code==code), qty=document.getElementById('qty-'+code).value;
      const unit=document.getElementById('unit-'+code)?document.getElementById('unit-'+code).value:'';
      html+=`<div class="cf-item"><span class="cf-name">${p.name}</span><span class="cf-qty">${qty} ${unit}</span></div>`;
    });
  }
  getFreeItems().forEach(item=>{
    html+=`<div class="cf-item"><span class="cf-name">${item.name} <span style="font-size:11px;color:#e08;font-weight:700">手入力</span></span><span class="cf-qty">${item.qty} ${item.unit}</span></div>`;
  });
  document.getElementById('cf-items').innerHTML=html;
  document.getElementById('cf-memo').innerHTML=memo?`<div style="margin-top:10px;padding:10px;background:#f5f5f2;border-radius:8px;font-size:13px;color:#555">📝 ${memo}</div>`:'';
  document.getElementById('overlay').classList.add('show');
}
function closeOverlay(){document.getElementById('overlay').classList.remove('show');}

function submitOrder(){
  closeOverlay();
  const staff=document.getElementById('sel-staff').value, cid=custSel.value, memo=document.getElementById('memo').value;
  const timeStr=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  const isNew=cid==='__new__';
  const cname=isNew?document.getElementById('new-cust-name').value.trim():(CUSTOMER_DATA[cid]?CUSTOMER_DATA[cid].name:cid);
  const regularItems=isNew?[]:Object.keys(selected).map(code=>{
    const p=CUSTOMER_DATA[cid].products.find(x=>x.code==code);
    const unit=document.getElementById('unit-'+code)?document.getElementById('unit-'+code).value:'';
    return{code:p.code,name:p.name,qty:parseInt(document.getElementById('qty-'+code).value)||1,unit};
  });
  const items=[...regularItems,...getFreeItems()];
  lastNo++;
  const no=lastNo;
  const payload={staff,customerCode:isNew?'新規':cid,customer:cname,time:timeStr,memo,items,cancelled:false,isNew:isNew};

  const sendBtn=document.getElementById('btn-send');
  if(sendBtn){sendBtn.disabled=true;sendBtn.textContent='送信中...';}

  fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .finally(()=>{
    orderLog.push({no,staff,cid,cname,items,memo,time:timeStr,cancelled:false,gasRow:null});
    renderLog();
    document.getElementById('s-msg').textContent=`${cname}\n${items.length}品目を記録しました（${no}件目）\n${timeStr}`;
    document.getElementById('success').classList.add('show');
    if(sendBtn){sendBtn.disabled=false;sendBtn.textContent='送信する ✓';}
  });
}

function cancelOrder(no){
  if(!confirm((no)+'件目の注文を取り消しますか？\nスプレッドシートの該当行を取消に更新します。'))return;
  const o=orderLog.find(x=>x.no===no);
  if(!o)return;
  o.cancelled=true;
  renderLog();
  // GASに取消通知（行番号があれば行番号で、なければ時刻で検索）
  const payload={type:'cancel',gasRow:o.gasRow||null,staff:o.staff,customerCode:o.cid,customer:o.cname,time:o.time};
  fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
}

function renderLog(){
  const logCard=document.getElementById('log-card'), logBody=document.getElementById('log-body');
  const badge=document.getElementById('log-badge'), printBtn=document.getElementById('print-all-btn');
  if(orderLog.length===0){logCard.style.display='none';return;}
  logCard.style.display='block';
  const activeCount=orderLog.filter(o=>!o.cancelled).length;
  badge.textContent=orderLog.length+'件';
  printBtn.disabled=activeCount===0;
  logBody.innerHTML=orderLog.map(o=>`
    <div class="log-row ${o.cancelled?'cancelled':''}">
      <div class="log-num ${o.cancelled?'cancelled-num':''}">${o.no}</div>
      <div class="log-body">
        <div><span class="log-cname">${o.cname}</span><span class="log-time">${o.time}</span><span style="font-size:11px;color:#888;margin-left:4px">${o.staff}</span>${o.cancelled?'<span style="margin-left:8px;font-size:11px;color:#c0392b;font-weight:700">【取消済】</span>':''}</div>
        <div class="log-items">${o.items.map(i=>i.name+' '+i.qty+(i.unit?' '+i.unit:'')).join('　')}</div>
        ${o.memo?`<div style="font-size:11px;color:#888;margin-top:2px">📝 ${o.memo}</div>`:''}
      </div>
      ${o.cancelled
        ? '<span class="cancelled-label">取消済</span>'
        : `<button class="log-cancel-btn" onclick="cancelOrder(${o.no})">取消</button>`
      }
    </div>
  `).join('');
}

function buildPrintHTML(orders){
  const dateStr=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const staff=orders.length>0?orders[0].staff:'';
  const activeOrders=orders.filter(o=>!o.cancelled);
  let blocks=orders.map(o=>{
    const isCancelled=o.cancelled;
    let rows=o.items.map(i=>`
      <tr>
        <td class="col-check">${isCancelled?'✕':'□'}</td>
        <td class="col-code">#${i.code}</td>
        <td class="col-name">${i.name}</td>
        <td class="col-qty">${i.qty}${i.unit?' '+i.unit:''}</td>
      </tr>`).join('');
    return `
      <div class="order-block ${isCancelled?'cancelled-block':''}">
        <div class="ob-header">
          <div>
            <div class="ob-seq">受注 ${o.no}件目</div>
            <div class="ob-cname">${o.cname}</div>
            <div class="ob-code">顧客コード: ${o.cid}</div>
          </div>
          <div class="ob-meta">
            ${isCancelled?'<span class="cancelled-stamp">取消済</span>':''}
            <div>担当: ${o.staff}</div>
            <div>${o.time}</div>
          </div>
        </div>
        <table class="ob-table">
          <thead><tr><th class="col-check">済</th><th class="col-code">商品CD</th><th class="col-name">商品名</th><th class="col-qty">数量</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${o.memo?`<div class="ob-memo">📝 メモ: ${o.memo}</div>`:''}
      </div>`;
  }).join('');

  return `
    <div class="print-page-header">
      <h1>ピッキング指示書</h1>
      <div class="ph-meta">${dateStr}　担当: ${staff}　有効: ${activeOrders.length}件（取消除く）</div>
    </div>
    ${blocks}
    <div class="print-footer">印刷日時: ${new Date().toLocaleString('ja-JP')}</div>`;
}

function printLatest(){
  document.getElementById('success').classList.remove('show');
  const latest=orderLog[orderLog.length-1];
  if(!latest)return;
  document.getElementById('print-area').innerHTML=buildPrintHTML([latest]);
  window.print();
}

function printAll(){
  document.getElementById('success').classList.remove('show');
  document.getElementById('print-area').innerHTML=buildPrintHTML(orderLog);
  window.print();
}

function resetForm(){
  document.getElementById('success').classList.remove('show');
  selected={};
  custSel.value='';
  document.getElementById('cust-search-input').value='';
  document.getElementById('cust-search-input').setAttribute('readonly','');
  document.getElementById('cust-dropdown').classList.remove('open');
  document.getElementById('memo').value='';
  document.getElementById('prod-list').innerHTML='<div class="placeholder"><div class="ico">🏪</div><p>顧客を選ぶと<br>定番商品が表示されます</p></div>';
  document.getElementById('prod-search').value='';
  document.getElementById('prod-search-wrap').style.display='none';
  document.getElementById('new-cust-wrap').style.display='none';
  document.getElementById('new-cust-name').value='';
  document.getElementById('free-items-wrap').style.display='none';
  document.getElementById('free-items-list').innerHTML='';
  freeItemCount=0;
  checkReady();
}
</script>
</body>
</html>
